name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JSHint
        run: npm install --global jshint

      - name: Run Linter
        run: |
          find giftlink-backend -type f -name '*.js' -print0 | xargs -0 jshint
          echo "Linted all the JS files successfully"

  client_build:
    name: Build client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: giftlink-frontend
        run: npm install

      - name: Run build
        working-directory: giftlink-frontend
        env:
          CI: true
        run: npm run build
